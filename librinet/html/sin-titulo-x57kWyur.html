<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Draw Pro - Mobile Friendly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overscroll-behavior: none;
            touch-action: none;
            background-color: #1a1a1a;
            height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex;
            flex-direction: column;
        }
        #canvas-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #111;
            padding-bottom: 80px; /* Espacio para que los controles no tapen el lienzo */
        }
        .layers-wrapper {
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #mainCanvas {
            position: relative;
            z-index: 2;
            cursor: crosshair;
            touch-action: none;
        }
        .tool-active {
            background-color: #4f46e5 !important;
            color: white !important;
        }
        /* Ajuste para que los controles floten sobre el lienzo en móviles */
        .mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 10px;
            right: 10px;
            z-index: 50;
        }
    </style>
</head>
<body class="text-gray-100">

    <header class="p-3 bg-gray-900 shadow-md flex justify-between items-center z-10">
        <h1 class="text-lg font-bold">PhotoDraw</h1>
        <div class="flex gap-2">
            <button id="cameraBtn" class="bg-indigo-600 active:bg-indigo-500 px-3 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                Foto
            </button>
            <button id="downloadBtn" class="bg-emerald-600 active:bg-emerald-500 px-3 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Guardar
            </button>
        </div>
    </header>

    <main id="canvas-container">
        <div class="layers-wrapper" id="wrapper">
            <canvas id="bgCanvas"></canvas>
            <canvas id="mainCanvas"></canvas>
        </div>
    </main>

    <!-- Controles Subidos y Flotantes -->
    <div class="mobile-controls">
        <footer class="p-3 bg-gray-900/90 backdrop-blur-md border border-gray-700 rounded-2xl flex flex-col gap-3 shadow-2xl">
            <div class="flex items-center justify-between gap-4">
                <!-- Herramientas Principales -->
                <div class="flex bg-gray-800 rounded-xl p-1 shrink-0">
                    <button id="penTool" class="tool-active p-2 rounded-lg transition" title="Pincel">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                    </button>
                    <button id="eraserTool" class="p-2 rounded-lg transition" title="Goma">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l6.6 6.6c1 1 1 2.5 0 3.4L13 21Z"/><path d="m22 21-8.2-.2"/><path d="m8 11 5 5"/></svg>
                    </button>
                    <button id="fillTool" class="p-2 rounded-lg transition" title="Relleno">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-7 7 7 7 8-8Z"/><path d="m14 7 3 3"/><path d="m5 18 .5.5a2 2 0 0 0 2.8 0l.5-.5"/><path d="M7 11c.2 0 .4-.1.6-.3l1.1-1.1c.4-.4.4-1 0-1.4-.4-.4-1-.4-1.4 0l-1.1 1.1c-.2.2-.2.4-.2.7Z"/></svg>
                    </button>
                    <button id="clearBtn" class="p-2 rounded-lg transition text-red-400" title="Borrar Capa">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>

                <!-- Selector de Color e Indicador de Grosor -->
                <div class="flex items-center gap-3 flex-grow justify-end">
                    <input type="range" id="sizePicker" min="1" max="50" value="8" class="w-full max-w-[100px] h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                    <input type="color" id="colorPicker" value="#4f46e5" class="w-10 h-10 rounded-xl border-2 border-gray-700 cursor-pointer bg-transparent overflow-hidden">
                </div>
            </div>
        </footer>
    </div>

    <!-- Cámara Modal Mejorada -->
    <div id="cameraModal" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center p-4">
        <div class="relative w-full max-w-lg aspect-[3/4] bg-gray-900 rounded-3xl overflow-hidden shadow-2xl border border-gray-800">
            <video id="previewVideo" autoplay playsinline class="w-full h-full object-cover"></video>
            
            <!-- Controles de Cámara -->
            <div class="absolute bottom-8 left-0 right-0 flex justify-center items-center gap-8">
                <button id="cancelCamera" class="bg-gray-800/80 p-4 rounded-full text-white active:bg-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                
                <button id="takePhoto" class="bg-white p-2 rounded-full shadow-lg scale-125 active:scale-95 transition">
                    <div class="w-12 h-12 rounded-full border-4 border-gray-900"></div>
                </button>

                <button id="flipCamera" class="bg-gray-800/80 p-4 rounded-full text-white active:bg-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const mainCanvas = document.getElementById('mainCanvas');
        const bgCanvas = document.getElementById('bgCanvas');
        const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });
        const bgCtx = bgCanvas.getContext('2d');
        const wrapper = document.getElementById('wrapper');
        
        const cameraBtn = document.getElementById('cameraBtn');
        const takePhotoBtn = document.getElementById('takePhoto');
        const flipCameraBtn = document.getElementById('flipCamera');
        const cameraModal = document.getElementById('cameraModal');
        const cancelCamera = document.getElementById('cancelCamera');
        const previewVideo = document.getElementById('previewVideo');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        
        const penTool = document.getElementById('penTool');
        const eraserTool = document.getElementById('eraserTool');
        const fillTool = document.getElementById('fillTool');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let drawing = false;
        let currentTool = 'pen';
        let stream = null;
        let currentFacingMode = 'environment'; // 'user' para frontal, 'environment' para trasera

        window.onload = () => {
            initCanvasSize();
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        };

        function initCanvasSize() {
            const container = document.getElementById('canvas-container');
            const w = container.clientWidth * 0.95;
            const h = container.clientHeight * 0.85;
            setSizes(w, h);
            bgCtx.fillStyle = "#ffffff";
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        }

        function setSizes(w, h) {
            mainCanvas.width = bgCanvas.width = w;
            mainCanvas.height = bgCanvas.height = h;
            wrapper.style.width = w + 'px';
            wrapper.style.height = h + 'px';
        }

        // --- Cámara con Volteo ---
        async function startCamera() {
            if (stream) stopCamera();
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode }, 
                    audio: false 
                });
                previewVideo.srcObject = stream;
                cameraModal.classList.remove('hidden');
                cameraModal.classList.add('flex');
            } catch (err) {
                alert("No se pudo acceder a la cámara. Verifica los permisos.");
            }
        }

        cameraBtn.addEventListener('click', startCamera);

        flipCameraBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            startCamera();
        });

        function stopCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            cameraModal.classList.remove('flex');
            cameraModal.classList.add('hidden');
            stream = null;
        }

        cancelCamera.addEventListener('click', stopCamera);

        takePhotoBtn.addEventListener('click', () => {
            const vW = previewVideo.videoWidth;
            const vH = previewVideo.videoHeight;
            
            const backgroundImage = new Image();
            backgroundImage.onload = () => {
                const container = document.getElementById('canvas-container');
                const maxW = container.clientWidth * 0.95;
                const maxH = container.clientHeight * 0.85;
                let scale = Math.min(maxW / vW, maxH / vH);
                
                const finalW = vW * scale;
                const finalH = vH * scale;
                
                setSizes(finalW, finalH);
                bgCtx.drawImage(backgroundImage, 0, 0, finalW, finalH);
                stopCamera();
            };
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = vW;
            tempCanvas.height = vH;
            const tctx = tempCanvas.getContext('2d');
            
            // Si la cámara es frontal, volteamos la imagen horizontalmente para que no sea espejo
            if (currentFacingMode === 'user') {
                tctx.translate(vW, 0);
                tctx.scale(-1, 1);
            }
            tctx.drawImage(previewVideo, 0, 0);
            backgroundImage.src = tempCanvas.toDataURL('image/png');
        });

        // --- Dibujo ---
        function getXY(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        mainCanvas.addEventListener('mousedown', startAction);
        mainCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); });

        function startAction(e) {
            const pos = getXY(e);
            if (currentTool === 'pen' || currentTool === 'eraser') {
                drawing = true;
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = sizePicker.value;
            } else if (currentTool === 'fill') {
                ctx.globalCompositeOperation = 'source-over';
                floodFill(Math.round(pos.x), Math.round(pos.y), colorPicker.value);
            }
        }

        function handleMove(e) {
            if (!drawing) return;
            const pos = getXY(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        // --- Relleno ---
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
            const data = imageData.data;
            const targetColor = getPixelColor(data, startX, startY);
            const fillRGB = hexToRgb(fillColor);
            if (colorsMatch(targetColor, [fillRGB.r, fillRGB.g, fillRGB.b, 255])) return;
            const stack = [[startX, startY]];
            const w = mainCanvas.width;
            const h = mainCanvas.height;
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const pos = (y * w + x) * 4;
                if (x < 0 || x >= w || y < 0 || y >= h) continue;
                if (!colorsMatch(getPixelColor(data, x, y), targetColor)) continue;
                data[pos] = fillRGB.r;
                data[pos+1] = fillRGB.g;
                data[pos+2] = fillRGB.b;
                data[pos+3] = 255;
                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(data, x, y) {
            const idx = (y * mainCanvas.width + x) * 4;
            return [data[idx], data[idx+1], data[idx+2], data[idx+3]];
        }

        function colorsMatch(c1, c2) {
            const tol = 5;
            return Math.abs(c1[0] - c2[0]) <= tol && Math.abs(c1[1] - c2[1]) <= tol &&
                   Math.abs(c1[2] - c2[2]) <= tol && Math.abs(c1[3] - c2[3]) <= tol;
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        // --- Herramientas ---
        function setActiveTool(toolId) {
            currentTool = toolId;
            [penTool, eraserTool, fillTool].forEach(btn => {
                if (btn.id === toolId + 'Tool') btn.classList.add('tool-active');
                else btn.classList.remove('tool-active');
            });
        }

        penTool.onclick = () => setActiveTool('pen');
        eraserTool.onclick = () => setActiveTool('eraser');
        fillTool.onclick = () => setActiveTool('fill');
        clearBtn.onclick = () => ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

        downloadBtn.onclick = () => {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = mainCanvas.width;
            exportCanvas.height = mainCanvas.height;
            const eCtx = exportCanvas.getContext('2d');
            eCtx.drawImage(bgCanvas, 0, 0);
            eCtx.drawImage(mainCanvas, 0, 0);
            const link = document.createElement('a');
            link.download = 'mi-dibujo.png';
            link.href = exportCanvas.toDataURL();
            link.click();
        };

        // Redimensionar si cambia la orientación
        window.addEventListener('resize', initCanvasSize);

    </script>
</body>
</html>
