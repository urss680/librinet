<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULIA / MIC TOK - Subida Directa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mux/mux-uploader"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin: 0 0 0.5rem 0; color: var(--primary); font-size: 1.8rem; }
        p { color: var(--text-dim); margin-bottom: 2rem; }

        /* Estilos del Mux Uploader */
        mux-uploader {
            display: none; /* Se muestra solo cuando el token es validado */
            --progress-bar-fill-color: var(--primary);
            --button-background-color: var(--primary);
            --button-border-radius: 12px;
            --container-border: 2px dashed #334155;
            --container-padding: 2rem;
        }

        #setup-loader {
            padding: 2rem;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #error-display {
            display: none;
            background: #450a0a;
            color: #f87171;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            border: 1px solid #7f1d1d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AULIA</h1>
    <p>Módulo de carga de video para <b>MIC TOK</b></p>

    <div id="setup-loader">
        <div class="spinner"></div>
        <span>Autenticando con Mux...</span>
    </div>

    <mux-uploader id="mux-uploader-component"></mux-uploader>

    <div id="error-display"></div>
</div>

<script>
    /** * CONFIGURACIÓN DE CREDENCIALES
     * Nota: Al estar en el HTML, estas llaves son visibles. 
     * Mantén este repositorio de GitHub como PRIVADO.
     */
    const MUX_TOKEN_ID = 'e3ef36ac-5d7d-4bb5-8be5-2f9b327dee4e';
    const MUX_TOKEN_SECRET = 'w9GYaE/JPunikZdZ0PkEpx4S4BAWagzQCJBAHiKHgvlhyMmf4MHOjSZmJtU0tYnTT9L/BOOOECA';

    async function setupDirectUpload() {
        const uploader = document.getElementById('mux-uploader-component');
        const loader = document.getElementById('setup-loader');
        const errorDiv = document.getElementById('error-display');

        try {
            // 1. Llamada inicial para obtener la URL firmada (Paso 1 de la guía)
            const response = await fetch('https://api.mux.com/video/v1/uploads', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Basic ' + btoa(`${MUX_TOKEN_ID}:${MUX_TOKEN_SECRET}`)
                },
                body: JSON.stringify({
                    new_asset_settings: { 
                        playback_policy: ['public'],
                        video_quality: 'basic'
                    },
                    cors_origin: '*' // Permite subir desde localhost o GitHub Pages
                })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error?.message || "Error al conectar con Mux");
            }

            // 2. Inyectar la URL en el componente (Paso 2 de la guía)
            uploader.setAttribute('endpoint', result.data.url);
            
            // 3. Mostrar interfaz
            loader.style.display = 'none';
            uploader.style.display = 'block';

            console.log("Mux Uploader listo. ID de subida:", result.data.id);

        } catch (err) {
            loader.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `<b>Error de configuración:</b><br>${err.message}<br><br><small>Asegúrate de ejecutar esto desde un servidor (http://) y no abriendo el archivo directamente.</small>`;
            console.error("Detalle técnico:", err);
        }
    }

    // Escuchar cuando la subida termina con éxito
    document.getElementById('mux-uploader-component').addEventListener('success', (status) => {
        console.log('¡Subida completada!', status.detail);
        alert('Video subido con éxito a MIC TOK. Mux lo está procesando.');
    });

    // Iniciar proceso
    setupDirectUpload();
</script>

</body>
</html>
