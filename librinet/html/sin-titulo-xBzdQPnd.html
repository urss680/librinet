<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Draw Pro - Anclaje IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TensorFlow.js y MoveNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        body {
            overscroll-behavior: none;
            touch-action: none;
            background-color: #1a1a1a;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #canvas-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            padding-bottom: 80px;
        }
        .layers-wrapper {
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
        }
        #bgCanvas, #aiCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        #bgCanvas { z-index: 1; }
        #aiCanvas { z-index: 2; }
        #mainCanvas {
            position: relative;
            z-index: 3;
            cursor: crosshair;
            touch-action: none;
        }
        #instruction-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 20px;
            border-radius: 20px;
            border: 2px solid #ec4899;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
        .tool-btn {
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
            background: #1f2937;
        }
        .tool-btn.active {
            background: #4f46e5;
            color: white;
        }
        #hiddenVideo { display: none; }
        .hidden { display: none !important; }
        
        .flash {
            animation: flash-anim 0.2s ease-out;
        }
        @keyframes flash-anim {
            0% { background-color: white; opacity: 0.8; }
            100% { background-color: transparent; opacity: 0; }
        }
    </style>
</head>
<body class="text-gray-100">

    <header class="p-3 bg-gray-900 shadow-md flex justify-center items-center z-10">
        <h1 class="text-lg font-bold flex items-center gap-2">
            DrawAnimate <span class="bg-pink-600 text-[10px] px-1.5 py-0.5 rounded uppercase font-black">IA</span>
        </h1>
    </header>

    <main id="canvas-container">
        <div id="instruction-overlay">
            <p id="instruction-text" class="text-white text-sm font-bold uppercase">1. Captura tu cara</p>
        </div>

        <div id="flash-effect" class="absolute inset-0 z-50 pointer-events-none"></div>

        <div class="layers-wrapper" id="wrapper">
            <canvas id="bgCanvas"></canvas>
            <canvas id="aiCanvas"></canvas>
            <canvas id="mainCanvas"></canvas>
        </div>
        
        <div id="loadingOverlay" class="absolute inset-0 z-[60] hidden flex-col items-center justify-center text-center p-6 bg-black/90">
            <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loadingText" class="text-pink-400 font-bold">Cargando...</p>
        </div>

        <video id="hiddenVideo" autoplay playsinline></video>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-50">
        <footer class="max-w-2xl mx-auto p-3 bg-gray-900/95 backdrop-blur-xl border border-gray-700 rounded-3xl flex flex-wrap items-center justify-between gap-3 shadow-2xl">
            
            <div id="drawingControls" class="hidden flex items-center gap-2">
                <button id="penBtn" class="tool-btn active" title="Pincel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                </button>
                <button id="eraserBtn" class="tool-btn" title="Goma">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l6.6 6.6c1 1 1 2.5 0 3.4L13 21Z"/><path d="m22 21-8.2-.2"/><path d="m8 11 5 5"/></svg>
                </button>
                <button id="fillBtn" class="tool-btn" title="Cubo de pintura">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-7 7 7 7 8-8Z"/><path d="m14 7 3 3"/><path d="M5 18 .5.5a2 2 0 0 0 2.8 0l.5-.5"/></svg>
                </button>
                
                <div class="h-8 w-px bg-gray-700 mx-1"></div>
                
                <input type="color" id="colorPicker" value="#ec4899" class="w-10 h-10 rounded-full border-2 border-gray-600 bg-transparent cursor-pointer">
                <input type="range" id="sizePicker" min="2" max="30" value="8" class="w-12 h-1.5 bg-gray-700 rounded-lg accent-pink-500">
            </div>

            <button id="actionBtn" class="bg-pink-600 hover:bg-pink-500 text-white font-black px-8 py-3 rounded-2xl flex items-center gap-2 transition-all shadow-lg shadow-pink-500/20 active:scale-95 w-full sm:w-auto justify-center">
                <span id="btnText">TOMAR FOTO</span>
                <svg id="actionIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
        </footer>
    </div>

    <script>
        let mainCanvas, bgCanvas, aiCanvas, ctx, bgCtx, aiCtx;
        let hiddenVideo, colorPicker, sizePicker, actionBtn, btnText, instructionText, drawingControls;
        let penBtn, eraserBtn, fillBtn, flashEffect;
        
        let drawing = false;
        let stream = null;
        let detector = null;
        let aiAnimationFrame = null;

        let appState = 'TAKING_PHOTO';
        let currentTool = 'pen';
        
        let drawingAnchorPoint = { x: 0, y: 0 };
        let drawnImageSource = null; // Guardaremos el dibujo como imagen transparente

        document.addEventListener('DOMContentLoaded', async () => {
            mainCanvas = document.getElementById('mainCanvas');
            bgCanvas = document.getElementById('bgCanvas');
            aiCanvas = document.getElementById('aiCanvas');
            hiddenVideo = document.getElementById('hiddenVideo');
            colorPicker = document.getElementById('colorPicker');
            sizePicker = document.getElementById('sizePicker');
            actionBtn = document.getElementById('actionBtn');
            btnText = document.getElementById('btnText');
            instructionText = document.getElementById('instruction-text');
            drawingControls = document.getElementById('drawingControls');
            flashEffect = document.getElementById('flash-effect');
            
            penBtn = document.getElementById('penBtn');
            eraserBtn = document.getElementById('eraserBtn');
            fillBtn = document.getElementById('fillBtn');

            ctx = mainCanvas.getContext('2d', { willReadFrequently: true });
            bgCtx = bgCanvas.getContext('2d');
            aiCtx = aiCanvas.getContext('2d');
            
            initCanvasSize();
            setupEventListeners();
            startCameraPreview();
        });

        function initCanvasSize() {
            const container = document.getElementById('canvas-container');
            const w = Math.min(container.clientWidth * 0.95, 500);
            const h = Math.min(container.clientHeight * 0.80, 700);
            mainCanvas.width = bgCanvas.width = aiCanvas.width = w;
            mainCanvas.height = bgCanvas.height = aiCanvas.height = h;
            const wrapper = document.getElementById('wrapper');
            wrapper.style.width = w + 'px';
            wrapper.style.height = h + 'px';
            
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            bgCtx.fillStyle = "#ffffff";
            bgCtx.fillRect(0, 0, w, h);
        }

        async function startCameraPreview() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 }, 
                    audio: false 
                });
                hiddenVideo.srcObject = stream;
                
                const step1Preview = () => {
                    if(appState === 'TAKING_PHOTO') {
                        bgCtx.save();
                        bgCtx.translate(bgCanvas.width, 0);
                        bgCtx.scale(-1, 1);
                        bgCtx.drawImage(hiddenVideo, 0, 0, bgCanvas.width, bgCanvas.height);
                        bgCtx.restore();
                        requestAnimationFrame(step1Preview);
                    }
                };
                requestAnimationFrame(step1Preview);
            } catch (err) {
                alert("Se necesita acceso a la cámara.");
            }
        }

        function setupEventListeners() {
            actionBtn.onclick = handleStateTransition;
            penBtn.onclick = () => setTool('pen');
            eraserBtn.onclick = () => setTool('eraser');
            fillBtn.onclick = () => setTool('fill');

            mainCanvas.addEventListener('mousedown', handlePointerDown);
            mainCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); });
            window.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('touchmove', handlePointerMove);
            window.addEventListener('mouseup', () => drawing = false);
            window.addEventListener('touchend', () => drawing = false);
        }

        function setTool(tool) {
            currentTool = tool;
            penBtn.classList.toggle('active', tool === 'pen');
            eraserBtn.classList.toggle('active', tool === 'eraser');
            fillBtn.classList.toggle('active', tool === 'fill');
        }

        function handleStateTransition() {
            if (appState === 'TAKING_PHOTO') {
                flashEffect.classList.add('flash');
                setTimeout(() => flashEffect.classList.remove('flash'), 200);
                appState = 'DRAWING';
                instructionText.innerText = "2. Dibuja sobre tu cara";
                btnText.innerText = "LISTO";
                document.getElementById('actionIcon').innerHTML = '<path d="m9 18 6-6-6-6"/>';
                drawingControls.classList.remove('hidden');
            } else if (appState === 'DRAWING') {
                appState = 'PICKING_NOSE_ON_DRAW';
                instructionText.innerText = "3. Toca tu NARIZ en el dibujo";
                btnText.innerText = "TOCA TU DIBUJO...";
                actionBtn.style.opacity = "0.5";
                actionBtn.disabled = true;
                drawingControls.classList.add('hidden');
            }
        }

        async function handlePointerDown(e) {
            const pos = getXY(e);
            if (appState === 'DRAWING') {
                if (currentTool === 'fill') {
                    executeFloodFill(Math.round(pos.x), Math.round(pos.y), colorPicker.value);
                } else {
                    drawing = true;
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                    ctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
                    ctx.strokeStyle = colorPicker.value;
                    ctx.lineWidth = sizePicker.value;
                }
            } else if (appState === 'PICKING_NOSE_ON_DRAW') {
                drawingAnchorPoint = pos;
                
                // CRUCIAL: Convertir el canvas a una imagen para pintar con transparencia
                drawnImageSource = new Image();
                drawnImageSource.src = mainCanvas.toDataURL();
                
                appState = 'IA_FOLLOWING';
                startIASequence();
            }
        }

        function handlePointerMove(e) {
            if (!drawing || appState !== 'DRAWING' || currentTool === 'fill') return;
            const pos = getXY(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function executeFloodFill(startX, startY, hexColor) {
            const imageData = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
            const pixels = imageData.data;
            const targetColor = getPixelColor(pixels, startX, startY);
            const fillColor = hexToRgb(hexColor);
            if (colorsMatch(targetColor, [fillColor.r, fillColor.g, fillColor.b, 255])) return;
            const stack = [[startX, startY]];
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                if (x < 0 || x >= mainCanvas.width || y < 0 || y >= mainCanvas.height) continue;
                const idx = (y * mainCanvas.width + x) * 4;
                if (colorsMatch(getPixelColor(pixels, x, y), targetColor)) {
                    pixels[idx] = fillColor.r; pixels[idx + 1] = fillColor.g; pixels[idx + 2] = fillColor.b; pixels[idx + 3] = 255;
                    stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(pixels, x, y) {
            const i = (y * mainCanvas.width + x) * 4;
            return [pixels[i], pixels[i+1], pixels[i+2], pixels[i+3]];
        }
        function colorsMatch(c1, c2) { return Math.abs(c1[0] - c2[0]) < 10 && Math.abs(c1[1] - c2[1]) < 10 && Math.abs(c1[2] - c2[2]) < 10 && Math.abs(c1[3] - c2[3]) < 10; }
        function hexToRgb(hex) { return { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) }; }

        async function startIASequence() {
            document.getElementById('loadingOverlay').classList.replace('hidden', 'flex');
            document.getElementById('loadingText').innerText = "Iniciando IA...";
            try {
                const model = poseDetection.SupportedModels.MoveNet;
                detector = await poseDetection.createDetector(model, {
                    runtime: 'tfjs', modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
                });
                document.getElementById('loadingOverlay').classList.replace('flex', 'hidden');
                instructionText.innerText = "¡DIBUJO ANIMADO!";
                document.querySelector('footer').classList.add('hidden');
                ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                renderIALoop();
            } catch (err) { alert("Error IA"); }
        }

        async function renderIALoop() {
            if (appState !== 'IA_FOLLOWING') return;

            // Capa Fondo: Video en vivo
            bgCtx.save();
            bgCtx.translate(bgCanvas.width, 0);
            bgCtx.scale(-1, 1);
            bgCtx.drawImage(hiddenVideo, 0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.restore();

            try {
                const poses = await detector.estimatePoses(hiddenVideo);
                aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
                
                if (poses.length > 0) {
                    const nose = poses[0].keypoints.find(k => k.name === 'nose');
                    if (nose && nose.score > 0.5) {
                        const scaleX = aiCanvas.width / hiddenVideo.videoWidth;
                        const scaleY = aiCanvas.height / hiddenVideo.videoHeight;
                        
                        const realNoseX = aiCanvas.width - (nose.x * scaleX);
                        const realNoseY = nose.y * scaleY;

                        const offsetX = realNoseX - drawingAnchorPoint.x;
                        const offsetY = realNoseY - drawingAnchorPoint.y;

                        // Capa Superior: Dibujar la imagen guardada respetando transparencia
                        // Usamos drawImage en lugar de putImageData para mantener el canal Alpha correctamente sobre el video
                        aiCtx.drawImage(drawnImageSource, offsetX, offsetY);
                    }
                }
            } catch (e) { console.error(e); }
            aiAnimationFrame = requestAnimationFrame(renderIALoop);
        }

        function getXY(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
    </script>
</body>
</html>
