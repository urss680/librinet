<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grito Challenge - Color Progresivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        .camera-container {
            position: relative;
            height: 100vh;
            width: 100vw;
            max-width: 56.25vh; 
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-hidden { 
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        #game-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            background: #000;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            z-index: 90;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .mic-icon {
            width: 80px;
            height: 80px;
            background: #ec4899;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(236, 72, 153, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }

        #final-overlay-ui {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            cursor: pointer;
            z-index: 60;
            position: absolute;
            bottom: 40px;
        }

        .record-btn-inner {
            width: 60px;
            height: 60px;
            background-color: #ef4444;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .recording .record-btn-inner { 
            border-radius: 10px; 
            transform: scale(0.5); 
        }

        .progress-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            z-index: 70;
            display: none;
        }

        .progress-fill { 
            height: 100%; 
            background: #ec4899; 
            width: 0%; 
        }

        .volume-meter {
            position: absolute;
            left: 20px;
            bottom: 40px;
            top: 40px;
            width: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            z-index: 80;
            display: none;
        }

        .volume-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #ec4899, #6366f1);
            border-radius: 5px;
            transition: height 0.05s ease;
        }
    </style>
</head>
<body>

    <div class="camera-container" id="cam-box">
        <div class="progress-bar" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        
        <div class="volume-meter" id="v-meter">
            <div class="volume-fill" id="v-fill" style="height: 0%"></div>
        </div>

        <video id="video-hidden" autoplay muted playsinline></video>
        <canvas id="game-canvas"></canvas>

        <div id="start-screen">
            <div class="mic-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M128,176a48.05,48.05,0,0,0,48-48V64a48,48,0,0,0-96,0v64A48.05,48.05,0,0,0,128,176ZM96,64a32,32,0,0,1,64,0v64a32,32,0,0,1-64,0ZM200,128a8,8,0,0,1-16,0,56,56,0,0,0-112,0,8,8,0,0,1-16,0,72.08,72.08,0,0,1,64-71.6V32a8,8,0,0,1,16,0V56.4A72.08,72.08,0,0,1,200,128Z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-pink-500 uppercase italic">Grito Challenge</h1>
            <p class="text-gray-300 mt-4 max-w-[250px]">Tu color cambiará progresivamente con tu grito.</p>
            <p class="text-pink-400 font-bold mt-2">TIEMPO: 30 SEGUNDOS</p>
            <button onclick="startApp()" class="mt-8 bg-white text-black font-bold px-8 py-3 rounded-full hover:bg-pink-500 hover:text-white transition-colors">EMPEZAR</button>
        </div>

        <div id="final-overlay-ui">
            <div class="flex gap-8">
                <button onclick="location.reload()" class="w-16 h-16 rounded-full bg-red-600 flex items-center justify-center text-2xl shadow-lg border-4 border-white/20">✕</button>
                <button onclick="confirmUpload()" class="w-16 h-16 rounded-full bg-green-600 flex items-center justify-center text-2xl shadow-lg border-4 border-white/20">✓</button>
            </div>
            <div id="upload-status" class="mt-4 hidden flex items-center gap-2">
                <div class="animate-spin rounded-full h-4 w-4 border-2 border-pink-500 border-t-transparent"></div>
                <span class="text-xs font-bold">SUBIENDO RETO...</span>
            </div>
        </div>

        <button id="record-trigger" class="record-btn" style="display: none;">
            <div class="record-btn-inner"></div>
        </button>
    </div>

    <script>
        const MUX_TOKEN_ID = '4aa292f3-6e0f-49da-ac2e-1f54aa24e00a';
        const MUX_TOKEN_SECRET = 'ZpyyyHvjOqLN2ZLnGGMlG8OEaQickNT6PvTG7RviLToMSTzV1JYRQJxHd0N6Me3xX7wXA+4iLzd';
        const PROXY = 'https://cors-anywhere.herokuapp.com/';

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video-hidden');
        
        let mediaRecorder, recordedChunks = [], camStream;
        let audioContext, analyser, dataArray;
        let isRecording = false, isGameOver = false;
        let startTime, currentVolume = 0;
        let paintLevel = 0; 
        const DURATION = 30000; 

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 1280 } },
                    audio: true
                });
                
                camStream = stream;
                video.srcObject = stream;
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                video.onloadedmetadata = () => {
                    canvas.width = 720; 
                    canvas.height = 1280;
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('record-trigger').style.display = 'flex';
                    document.getElementById('v-meter').style.display = 'block';
                    renderLoop();
                };
            } catch (e) { 
                alert("Se requieren permisos de cámara y micrófono."); 
            }
        }

        function renderLoop() {
            if (!video.videoWidth) {
                requestAnimationFrame(renderLoop);
                return;
            }

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                currentVolume = sum / dataArray.length; 
                
                let volPercent = Math.min(100, (currentVolume / 100) * 100);
                document.getElementById('v-fill').style.height = volPercent + "%";
                
                if (isRecording && !isGameOver) {
                    // Detección de volumen para subir nivel
                    if (volPercent > 15) {
                        const boost = (volPercent - 15) / 100 * 0.4;
                        paintLevel = Math.min(100, paintLevel + boost);
                    }
                }
            }

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Dibujar Video Base
            const scale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
            const w = video.videoWidth * scale;
            const h = video.videoHeight * scale;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;

            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, x, y, w, h);

            // 2. EFECTO DE COLOR PROGRESIVO (Desde 0% hasta 100%)
            if (paintLevel > 0) {
                const intensity = paintLevel / 100; // Proporción directa 0 a 1
                
                // Capa de mezcla de color (Multiplicar para tonos oscuros/saturados)
                ctx.globalCompositeOperation = "multiply";
                ctx.fillStyle = `rgba(236, 72, 153, ${intensity * 0.7})`; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Capa de brillo (Trama para los tonos violetas vibrantes)
                ctx.globalCompositeOperation = "screen";
                ctx.fillStyle = `rgba(99, 102, 241, ${intensity * 0.4})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.globalCompositeOperation = "source-over";
            }
            ctx.restore();

            // 3. Interfaz de Usuario
            if (isRecording) {
                const barY = canvas.height - 120;
                // Fondo barra
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.roundRect(80, barY, 560, 50, 25); ctx.fill();
                
                // Relleno barra con gradiente
                const grad = ctx.createLinearGradient(80, 0, 640, 0);
                grad.addColorStop(0, '#ec4899');
                grad.addColorStop(1, '#6366f1');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.roundRect(80, barY, (paintLevel / 100) * 560, 50, 25); ctx.fill();
                
                // Texto de Potencia
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = "black";
                ctx.shadowBlur = 10;
                ctx.fillText(`POTENCIA: ${Math.floor(paintLevel)}%`, canvas.width/2, barY - 20);
                ctx.shadowBlur = 0;

                if (isGameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ec4899';
                    ctx.font = 'black 140px Arial Black';
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.floor(paintLevel) + "%", canvas.width/2, canvas.height/2);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 40px Arial';
                    ctx.fillText(paintLevel >= 100 ? "¡PODER ABSOLUTO!" : "RESULTADO FINAL", canvas.width/2, canvas.height/2 + 70);
                }
            }
            
            ctx.restore();
            requestAnimationFrame(renderLoop);
        }

        document.getElementById('record-trigger').onclick = async () => {
            if (isRecording) return;
            
            isRecording = true;
            isGameOver = false;
            paintLevel = 0;
            recordedChunks = [];
            document.getElementById('cam-box').classList.add('recording');
            document.getElementById('p-bar').style.display = 'block';

            const canvasStream = canvas.captureStream(30);
            canvasStream.addTrack(camStream.getAudioTracks()[0]);

            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp8,opus' });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.start();

            startTime = Date.now();
            const timer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                if (elapsed >= DURATION) {
                    clearInterval(timer);
                    stopRecording();
                    return;
                }
                document.getElementById('p-fill').style.width = (elapsed / DURATION * 100) + "%";
            }, 100);
        };

        function stopRecording() {
            isGameOver = true;
            document.getElementById('final-overlay-ui').style.display = 'flex';
            document.getElementById('record-trigger').style.display = 'none';
        }

        async function confirmUpload() {
            document.getElementById('upload-status').classList.remove('hidden');
            mediaRecorder.stop();
            
            setTimeout(async () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                try {
                    const auth = btoa(`${MUX_TOKEN_ID}:${MUX_TOKEN_SECRET}`);
                    const res = await fetch(PROXY + 'https://api.mux.com/video/v1/uploads', {
                        method: 'POST',
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ new_asset_settings: { playback_policy: ['public'] }, cors_origin: "*" })
                    });
                    const data = await res.json();
                    await fetch(data.data.url, { method: 'PUT', body: blob });
                    alert("¡Reto subido con éxito!"); location.reload();
                } catch (e) { alert("Error en la subida."); }
            }, 600);
        }
    </script>
</body>
</html>
