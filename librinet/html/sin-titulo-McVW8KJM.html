<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabador VLIP - 30s Obligatorios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .camera-container {
            position: relative;
            height: 100vh;
            width: calc(100vh * 9 / 16);
            max-width: 100vw;
            background: #1a1a1a;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #preview {
            position: absolute;
            height: 100%;
            width: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
        }

        .mirror-off #preview {
            transform: scaleX(1);
        }

        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }

        .record-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .record-btn-inner {
            width: 55px;
            height: 55px;
            background-color: #ef4444;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .recording .record-btn-inner {
            border-radius: 8px;
            transform: scale(0.5);
        }

        .timer {
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 20px;
            letter-spacing: 0.05em;
        }

        .warning-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239, 68, 68, 0.9);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 70;
            width: 80%;
        }

        .switch-btn {
            position: absolute;
            right: 20px;
            bottom: 0px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
        }

        .progress-bar-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            z-index: 60;
        }

        .progress-bar-fill {
            height: 100%;
            background: #ef4444;
            width: 0%;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .uploading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ef4444;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="camera-container" id="cam-box">
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="recording-progress"></div>
        </div>

        <div id="warning" class="warning-msg">
            <p class="font-bold">¡Video descartado!</p>
            <p class="text-xs mt-1">Debes grabar los 30 segundos completos.</p>
        </div>
        
        <video id="preview" autoplay muted playsinline></video>

        <div class="controls">
            <div class="timer" id="timer-display">00:00 / 00:30</div>
            
            <div class="flex items-center justify-center w-full relative">
                <button id="record-trigger" class="record-btn">
                    <div class="record-btn-inner"></div>
                </button>

                <button id="switch-camera" class="switch-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="upload-overlay" class="uploading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-bold">Subiendo video vertical...</p>
        <p class="text-sm text-gray-400" id="upload-status">Procesando audio y video</p>
    </div>

    <script>
        const MUX_TOKEN_ID = '4aa292f3-6e0f-49da-ac2e-1f54aa24e00a';
        const MUX_TOKEN_SECRET = 'ZpyyyHvjOqLN2ZLnGGMlG8OEaQickNT6PvTG7RviLToMSTzV1JYRQJxHd0N6Me3xX7wXA+4iLzd';
        const PROXY = 'https://cors-anywhere.herokuapp.com/';
        const MUX_API_BASE = 'https://api.mux.com/video/v1';

        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let isRecording = false;
        let startTime;
        let timerInterval;
        let currentFacingMode = 'user'; 
        const MAX_DURATION = 30000;

        const videoPreview = document.getElementById('preview');
        const camBox = document.getElementById('cam-box');
        const recordBtn = document.getElementById('record-trigger');
        const timerDisplay = document.getElementById('timer-display');
        const progressBar = document.getElementById('recording-progress');
        const uploadOverlay = document.getElementById('upload-overlay');
        const warningBox = document.getElementById('warning');
        const switchBtn = document.getElementById('switch-camera');

        async function startCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            try {
                const constraints = {
                    video: { 
                        facingMode: currentFacingMode,
                        aspectRatio: 9/16,
                        width: { ideal: 1080 },
                        height: { ideal: 1920 }
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoPreview.srcObject = stream;

                if (currentFacingMode === 'user') {
                    camBox.classList.remove('mirror-off');
                } else {
                    camBox.classList.add('mirror-off');
                }
            } catch (err) {
                console.error("Permisos denegados:", err);
                alert("Se requieren permisos de cámara y micrófono.");
            }
        }

        switchBtn.onclick = () => {
            if (isRecording) return; // Evitar cambio durante grabación
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera();
        };

        recordBtn.onclick = () => {
            if (!isRecording) {
                startRecording();
            } else {
                // Si el usuario intenta parar antes, descartamos
                cancelRecording();
            }
        };

        function startRecording() {
            recordedChunks = [];
            const options = { mimeType: 'video/webm;codecs=vp8,opus' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options.mimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, options);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            // Solo subimos si la grabación termina por el temporizador
            mediaRecorder.onstop = () => {
                const elapsed = Date.now() - startTime;
                if (elapsed >= MAX_DURATION - 100) { // Margen de 100ms
                    uploadToMux();
                } else {
                    console.log("Grabación cancelada por tiempo insuficiente.");
                }
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.classList.add('recording');
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
        }

        function cancelRecording() {
            if (!isRecording) return;
            
            // Detener lógicamente
            isRecording = false;
            clearInterval(timerInterval);
            mediaRecorder.stop();
            
            // Limpiar UI y mostrar aviso
            recordBtn.classList.remove('recording');
            timerDisplay.innerText = "00:00 / 00:30";
            progressBar.style.width = '0%';
            recordedChunks = []; // Borrar lo grabado
            
            showWarning();
        }

        function showWarning() {
            warningBox.style.display = 'block';
            setTimeout(() => {
                warningBox.style.display = 'none';
            }, 3000);
        }

        function updateTimer() {
            const elapsed = Date.now() - startTime;
            
            if (elapsed >= MAX_DURATION) {
                isRecording = false;
                clearInterval(timerInterval);
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
                timerDisplay.innerText = "00:00 / 00:30";
                progressBar.style.width = '0%';
                return;
            }

            const seconds = Math.floor(elapsed / 1000);
            const ms = Math.floor((elapsed % 1000) / 10);
            timerDisplay.innerText = `${seconds.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')} / 00:30`;
            progressBar.style.width = `${(elapsed / MAX_DURATION) * 100}%`;
        }

        async function uploadToMux() {
            uploadOverlay.style.display = 'flex';
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            
            try {
                const auth = btoa(`${MUX_TOKEN_ID}:${MUX_TOKEN_SECRET}`);
                const uploadRes = await fetch(PROXY + MUX_API_BASE + '/uploads', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Basic ${auth}`,
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({ 
                        new_asset_settings: { playback_policy: ['public'] },
                        cors_origin: "*" 
                    })
                });

                const uploadData = await uploadRes.json();
                const uploadUrl = uploadData.data.url;

                await fetch(uploadUrl, { method: 'PUT', body: blob });

                document.getElementById('upload-status').innerText = "¡Subida exitosa!";
                setTimeout(() => {
                    uploadOverlay.style.display = 'none';
                    document.getElementById('upload-status').innerText = "Procesando audio y video";
                }, 2000);

            } catch (err) {
                alert("Error: " + err.message);
                uploadOverlay.style.display = 'none';
            }
        }

        startCamera();
    </script>
</body>
</html>
