<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clippy Música - Reto Musical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        .camera-container {
            position: relative;
            height: 100vh;
            width: 100vw;
            max-width: 56.25vh; 
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #video-hidden { 
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        #game-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            background: #000;
        }

        #music-picker {
            position: absolute;
            inset: 0;
            z-index: 90;
            background: #000;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .music-card:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: #ec4899;
        }

        #interaction-layer {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .game-active #interaction-layer { display: flex; }

        .hitbox-container {
            position: absolute;
            top: 48%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 85%;
            pointer-events: auto;
        }

        .hitbox { 
            aspect-ratio: 1.2 / 1; 
            cursor: pointer; 
            border-radius: 15px;
        }

        #final-overlay-ui {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 60;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .record-btn-inner {
            width: 60px;
            height: 60px;
            background-color: #ef4444;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .recording .record-btn-inner { 
            border-radius: 10px; 
            transform: scale(0.5); 
        }

        .progress-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            z-index: 70;
            display: none;
        }

        .progress-fill { 
            height: 100%; 
            background: #ec4899; 
            width: 0%; 
        }
        
        .artwork-preview {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="camera-container" id="cam-box">
        <div class="progress-bar" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>

        <video id="video-hidden" autoplay muted playsinline></video>
        <canvas id="game-canvas"></canvas>

        <div id="music-picker">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-pink-500 italic tracking-tighter uppercase">Clippy Música</h1>
                <p class="text-gray-400 text-sm mt-2">Busca un tema de Apple Music</p>
            </div>
            
            <input type="text" id="music-input" placeholder="Artista o canción..." 
                   class="w-full bg-white/10 p-4 rounded-2xl text-white outline-none border border-white/20 mb-6 focus:border-pink-500">
            
            <div id="music-results" class="flex-1 space-y-2"></div>
        </div>

        <div id="interaction-layer">
            <div class="hitbox-container">
                <div class="hitbox" onclick="handleInput(0)"></div>
                <div class="hitbox" onclick="handleInput(1)"></div>
                <div class="hitbox" onclick="handleInput(2)"></div>
            </div>
        </div>

        <div id="final-overlay-ui">
            <div class="flex gap-8">
                <button onclick="discardVideo()" class="w-16 h-16 rounded-full bg-red-600 flex items-center justify-center text-2xl shadow-lg">✕</button>
                <button onclick="confirmUpload()" class="w-16 h-16 rounded-full bg-green-600 flex items-center justify-center text-2xl shadow-lg">✓</button>
            </div>
            <div id="upload-status" class="mt-4 hidden flex items-center gap-2">
                <div class="animate-spin rounded-full h-4 w-4 border-2 border-pink-500 border-t-transparent"></div>
                <span class="text-xs font-bold">SUBIENDO...</span>
            </div>
        </div>

        <div class="controls" id="main-controls">
            <div id="selected-info" class="flex items-center gap-3 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full mb-4 border border-white/10">
                <img src="" id="mini-artwork" class="w-6 h-6 rounded-full animate-spin-slow">
                <span id="mini-song-name" class="text-[10px] font-black truncate max-w-[140px]"></span>
            </div>
            <button id="record-trigger" class="record-btn">
                <div class="record-btn-inner"></div>
            </button>
        </div>
    </div>

    <script>
        const MUX_TOKEN_ID = '4aa292f3-6e0f-49da-ac2e-1f54aa24e00a';
        const MUX_TOKEN_SECRET = 'ZpyyyHvjOqLN2ZLnGGMlG8OEaQickNT6PvTG7RviLToMSTzV1JYRQJxHd0N6Me3xX7wXA+4iLzd';
        const PROXY = 'https://cors-anywhere.herokuapp.com/';

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video-hidden');
        const audioPlayer = new Audio();
        audioPlayer.crossOrigin = "anonymous";
        
        let mediaRecorder, recordedChunks = [], camStream;
        let isRecording = false, isGameOver = false;
        let startTime, score = 0;
        let gameData = { question: '', options: [], correct: null };
        let selectedTrack = null;
        const DURATION = 30000;

        async function initCamera() {
            try {
                camStream = await navigator.mediaDevices.getUserMedia({
                    // Pedimos explícitamente resolución vertical (720x1280 en vez de 1280x720)
                    video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 1280 } },
                    audio: false
                });
                video.srcObject = camStream;
                video.onloadedmetadata = () => {
                    canvas.width = 720; 
                    canvas.height = 1280;
                    renderLoop();
                };
            } catch (e) { alert("Permite el acceso a la cámara."); }
        }

        document.getElementById('music-input').oninput = async (e) => {
            const query = e.target.value;
            if(query.length < 3) return;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&limit=6&media=music`);
            const data = await res.json();
            const resultsDiv = document.getElementById('music-results');
            resultsDiv.innerHTML = '';
            data.results.forEach(track => {
                const div = document.createElement('div');
                div.className = "music-card";
                div.innerHTML = `<img src="${track.artworkUrl100}" class="artwork-preview"><div><p class="font-bold text-sm truncate">${track.trackName}</p><p class="text-xs text-gray-400">${track.artistName}</p></div>`;
                div.onclick = () => {
                    selectedTrack = track;
                    audioPlayer.src = track.previewUrl;
                    document.getElementById('music-picker').style.display = 'none';
                    document.getElementById('main-controls').style.display = 'flex';
                    document.getElementById('p-bar').style.display = 'block';
                    document.getElementById('mini-artwork').src = track.artworkUrl100;
                    document.getElementById('mini-song-name').innerText = track.trackName;
                };
                resultsDiv.appendChild(div);
            });
        };

        function renderLoop() {
            if (!video.videoWidth) {
                requestAnimationFrame(renderLoop);
                return;
            }

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cálculo perfecto para "Object-Fit: Cover"
            const scale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
            const w = video.videoWidth * scale;
            const h = video.videoHeight * scale;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;

            // Efecto Espejo
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            
            // Dibujamos el video perfectamente centrado
            ctx.drawImage(video, x, y, w, h);
            ctx.restore();

            // Dibujar UI sobre el video
            if (isRecording) {
                if (!isGameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath(); ctx.roundRect(60, 420, 600, 320, 40); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = 'bold 100px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(gameData.question, canvas.width/2, 540);
                    gameData.options.forEach((opt, i) => {
                        const btnX = 110 + (i * 180);
                        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.roundRect(btnX, 610, 140, 90, 20); ctx.fill();
                        ctx.fillStyle = 'black'; ctx.font = 'bold 50px Arial';
                        ctx.fillText(opt, btnX + 70, 675);
                    });
                } else {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ec4899'; ctx.font = 'bold 180px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(score, canvas.width/2, 650);
                    ctx.fillStyle = 'white'; ctx.font = 'bold 40px Arial';
                    ctx.fillText("PUNTOS TOTALES", canvas.width/2, 710);
                }
                // Marcador persistente
                ctx.fillStyle = '#ec4899'; ctx.beginPath(); ctx.roundRect(canvas.width - 240, 50, 200, 70, 35); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 32px Arial'; ctx.textAlign = 'center';
                ctx.fillText(`PTS: ${score}`, canvas.width - 140, 95);
            }
            requestAnimationFrame(renderLoop);
        }

        function nextQuestion() {
            const a = Math.floor(Math.random() * 11), b = Math.floor(Math.random() * 11);
            const plus = Math.random() > 0.5;
            let res = plus ? a + b : Math.max(a,b) - Math.min(a,b);
            gameData.question = plus ? `${a}+${b}` : `${Math.max(a,b)}-${Math.min(a,b)}`;
            gameData.correct = res;
            let opts = new Set([res]);
            while(opts.size < 3) opts.add(Math.max(0, res + Math.floor(Math.random()*4) - 2));
            gameData.options = Array.from(opts).sort((x, y) => x - y);
        }

        function handleInput(i) {
            if (!isRecording || isGameOver) return;
            if (gameData.options[i] === gameData.correct) score++;
            nextQuestion();
        }

        document.getElementById('record-trigger').onclick = async () => {
            if (isRecording) return;
            score = 0; isGameOver = false; recordedChunks = []; isRecording = true;
            document.getElementById('cam-box').classList.add('game-active', 'recording');
            nextQuestion();
            audioPlayer.play();

            const canvasStream = canvas.captureStream(30);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            const source = audioCtx.createMediaElementSource(audioPlayer);
            source.connect(dest); source.connect(audioCtx.destination);
            canvasStream.addTrack(dest.stream.getAudioTracks()[0]);

            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp8,opus' });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.start();

            startTime = Date.now();
            const timer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                if (elapsed >= DURATION) {
                    clearInterval(timer);
                    isGameOver = true;
                    document.getElementById('final-overlay-ui').style.display = 'flex';
                    document.getElementById('main-controls').style.display = 'none';
                    document.getElementById('p-fill').style.width = "100%";
                    return;
                }
                document.getElementById('p-fill').style.width = (elapsed / DURATION * 100) + "%";
            }, 100);
        };

        function discardVideo() { location.reload(); }

        async function confirmUpload() {
            document.getElementById('upload-status').classList.remove('hidden');
            mediaRecorder.stop();
            setTimeout(async () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                try {
                    const auth = btoa(`${MUX_TOKEN_ID}:${MUX_TOKEN_SECRET}`);
                    const res = await fetch(PROXY + 'https://api.mux.com/video/v1/uploads', {
                        method: 'POST',
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ new_asset_settings: { playback_policy: ['public'] }, cors_origin: "*" })
                    });
                    const data = await res.json();
                    await fetch(data.data.url, { method: 'PUT', body: blob });
                    alert("¡Video subido con éxito!"); location.reload();
                } catch (e) { alert("Error de conexión"); }
            }, 600);
        }

        window.onload = initCamera;
    </script>
</body>
</html>
