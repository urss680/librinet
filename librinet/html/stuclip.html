<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clippy Música: Grabador Pro</title>
  <style>
    :root {
      --bg: #0c0c0c;
      --card: #1a1a1a;
      --primary: #1db954;
      --text: #ffffff;
      --subtle: #a0a0a0;
      --highlight: #1ed760;
      --danger: #ff4444;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 2rem; color: var(--primary); }

    .search-container { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; max-width: 600px; }
    #searchForm { display: flex; flex: 1; gap: 10px; }
    input[type="text"] {
      flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #333;
      background: #222; color: white; outline: none; font-size: 1rem;
    }
    button {
      padding: 10px 20px; border-radius: 30px; border: none; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: black; }
    .btn-primary:hover:not(:disabled) { background: var(--highlight); transform: scale(1.05); }
    .btn-random { background: #333; color: white; font-size: 1.2rem; padding: 10px 15px; }
    .btn-random:hover { background: #444; transform: rotate(15deg); }
    
    .section-title { width: 100%; max-width: 1200px; margin-bottom: 15px; font-size: 1.2rem; font-weight: 700; color: var(--subtle); }

    #results {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px; width: 100%; max-width: 1200px;
    }
    .track {
      background: var(--card); padding: 15px; border-radius: 12px;
      display: flex; flex-direction: column; transition: transform 0.2s;
    }
    .track img { width: 100%; aspect-ratio: 1; border-radius: 8px; margin-bottom: 10px; object-fit: cover; }
    .track h3 { font-size: 0.95rem; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track p { font-size: 0.8rem; color: var(--subtle); margin-bottom: 15px; }

    .btn-full { background: var(--primary); color: black; margin-top: auto; border: none; font-weight: bold; padding: 10px; border-radius: 8px;}

    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 1000; align-items: flex-end; justify-content: center;
    }
    .modal.show { display: flex; }
    
    .modal-content {
      background: #121212; width: 100%; max-width: 600px; 
      border-radius: 30px 30px 0 0; padding-bottom: 40px; 
      position: relative; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateY(100%);
      max-height: 95vh; overflow-y: auto; 
      display: flex; flex-direction: column;
    }
    .modal.show .modal-content { transform: translateY(0); }

    .swipe-handle { width: 40px; height: 5px; background: #333; border-radius: 10px; margin: 15px auto; flex-shrink: 0; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888; z-index: 10; }

    .editor-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }

    #clipPreviewContainer {
      width: 240px; aspect-ratio: 9/16; background: #000; border-radius: 16px;
      overflow: hidden; position: relative; border: 1px solid #222;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8); flex-shrink: 0;
    }
    #previewCanvas { width: 100%; height: 100%; display: block; }
    
    .filters-wrapper {
        width: 100%; overflow-x: auto; padding: 10px 0;
        scrollbar-width: none; -ms-overflow-style: none;
        flex-shrink: 0;
    }
    .filters-wrapper::-webkit-scrollbar { display: none; }
    
    .filters-container {
        display: flex; gap: 12px; width: max-content; padding: 0 20px;
    }
    .filter-item {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        cursor: pointer; min-width: 65px;
    }
    .filter-icon {
        width: 56px; height: 56px; border-radius: 14px; background: #222;
        border: 2px solid #333; display: flex; align-items: center; justify-content: center;
        font-size: 1.5rem; transition: all 0.2s ease;
    }
    .filter-item.active .filter-icon { 
        border-color: var(--primary); 
        background: #282828; 
        transform: scale(1.08);
        box-shadow: 0 0 15px rgba(29, 185, 84, 0.4);
    }
    .filter-label { font-size: 0.65rem; color: var(--subtle); font-weight: 600; text-transform: uppercase; text-align: center; }

    .recording-section { width: 100%; max-width: 300px; padding: 0 20px; flex-shrink: 0; margin-bottom: 20px; }
    #exportBtn {
        background: #fff; color: #000; padding: 18px; font-size: 1rem;
        font-weight: 800; border: none; border-radius: 40px; width:100%;
        cursor: pointer; margin-bottom: 10px;
    }
    #exportBtn.recording { background: var(--danger); color: white; animation: pulse-red 1.5s infinite; }
    
    @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

    .progress-container { width: 100%; height: 5px; background: #222; border-radius: 3px; margin-top: 10px; overflow: hidden; display: none; }
    #progressBar { width: 0%; height: 100%; background: var(--primary); }
    .recording-info { text-align: center; margin-top: 10px; font-weight: bold; display: none; font-size: 0.8rem; color: var(--subtle); }

    .loader { border: 3px solid #333; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>🎬 Clippy Música</h1>

  <div class="search-container">
    <form id="searchForm">
      <input id="query" type="text" placeholder="Busca canción o artista..." required/>
      <button type="submit" class="btn-primary">Buscar</button>
    </form>
    <button class="btn-random" onclick="playRandomTrack()" title="Suerte">🎲</button>
  </div>

  <div id="resultsTitle" class="section-title">🔥 Top España</div>
  <section id="results"></section>

  <video id="webcamVideo" autoplay playsinline muted style="display:none;"></video>

  <div id="clipModal" class="modal" onclick="handleOutsideClick(event)">
    <div class="modal-content" id="modalContent">
      <div class="swipe-handle"></div>
      <span class="close-btn" onclick="closeModal()">✕</span>
      
      <div class="editor-layout">
        <div id="clipPreviewContainer">
          <canvas id="previewCanvas"></canvas>
        </div>

        <div class="filters-wrapper">
            <div class="filters-container" id="filtersList">
                <!-- Filtros dinámicos -->
            </div>
        </div>

        <div class="recording-section">
            <button id="exportBtn">🔴 GRABAR CLIP</button>
            <div id="progressBox" class="progress-container">
              <div id="progressBar"></div>
            </div>
            <div id="timerDisplay" class="recording-info">
              TIEMPO RESTANTE: <span id="timeLeft">0.0s</span>
            </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    let currentBuffer = null;
    let previewSource = null;
    let webcamStream = null;
    let isRecording = false;
    let countdownValue = 0;
    let animationId = null;
    let isMirrored = true;
    let currentFacingMode = "user";
    let activeFilter = 'none';
    let globalTracks = [];

    // Estado Scanner
    let lastScannerY = 0;
    let scannerCanvas = document.createElement('canvas');
    let scannerCtx = scannerCanvas.getContext('2d');
    let scannerStartTime = null;
    const SCAN_DURATION = 30000; 

    const videoElement = document.getElementById('webcamVideo');
    const previewCanvas = document.getElementById('previewCanvas');
    const resultsGrid = document.getElementById('results');
    const filtersList = document.getElementById('filtersList');
    const modal = document.getElementById('clipModal');
    const progressBar = document.getElementById('progressBar');
    const progressBox = document.getElementById('progressBox');
    const timerDisplay = document.getElementById('timerDisplay');
    const timeLeftSpan = document.getElementById('timeLeft');

    const tempCanvas = document.createElement('canvas');
    const tCtx = tempCanvas.getContext('2d');

    const FILTERS_DATA = [
        { id: 'audio', label: 'Oír', icon: '🎵', action: () => { togglePreview(); } },
        { id: 'none', label: 'Normal', icon: '🔳' },
        { id: 'edges', label: 'Bordes', icon: '🕸️' },
        { id: 'neon', label: 'Neón', icon: '🌈' },
        { id: 'sketch', label: 'Lápiz', icon: '✏️' },
        { id: 'cartoon', label: 'Cartoon', icon: '🎨' },
        { id: 'scanner', label: 'Scanner', icon: '⏳', action: () => { resetScanner(); activeFilter = 'scanner'; initFilters(); } },
        { id: 'noir', label: 'B/N', icon: '👤' },
        { id: 'sepia', label: 'Sepia', icon: '📜' },
        { id: 'mirror', label: 'Espejo', icon: '🪞', action: () => { isMirrored = !isMirrored; } },
        { id: 'camera', label: 'Cámara', icon: '🔄', action: () => { switchCamera(); } },
        { id: 'thermal', label: 'Termal', icon: '🌡️' }
    ];

    function resetScanner() {
        lastScannerY = 0;
        scannerStartTime = null;
        const w = 720, h = 1280;
        scannerCanvas.width = w;
        scannerCanvas.height = h;
        scannerCtx.fillStyle = '#000';
        scannerCtx.fillRect(0, 0, w, h);
    }

    function initFilters() {
        filtersList.innerHTML = '';
        FILTERS_DATA.forEach(f => {
            const div = document.createElement('div');
            const isAudio = f.id === 'audio';
            div.className = `filter-item ${activeFilter === f.id ? 'active' : ''}`;
            div.innerHTML = `
                <div class="filter-icon">${isAudio && previewSource ? '⏹' : f.icon}</div>
                <div class="filter-label">${f.label}</div>
            `;
            div.onclick = () => {
                if (f.action) {
                    f.action();
                    if(isAudio) initFilters(); 
                } else {
                    activeFilter = f.id;
                    initFilters();
                }
            };
            filtersList.appendChild(div);
        });
    }

    async function switchCamera() {
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
        await initCamera();
    }

    function togglePreview() {
        if (!currentBuffer) return;
        if (previewSource) { 
            stopPreview(); 
        } else {
            previewSource = audioCtx.createBufferSource();
            previewSource.buffer = currentBuffer;
            previewSource.connect(audioCtx.destination);
            previewSource.start(0);
            previewSource.onended = () => { 
                stopPreview(); 
                initFilters();
            };
        }
    }

    function stopPreview() {
        if (previewSource) { 
            try { previewSource.stop(); } catch(e) {} 
            previewSource = null; 
        }
    }

    async function initCamera() {
        if (webcamStream) webcamStream.getTracks().forEach(t => t.stop());
        try {
            webcamStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: false 
            });
            videoElement.srcObject = webcamStream;
            await videoElement.play();
        } catch(e) { console.error("Cámara no disponible."); }
    }

    async function openClipEditor(audioUrl) {
      modal.classList.add('show');
      activeFilter = 'none';
      resetScanner();
      initFilters();
      await initCamera();
      const response = await fetch(audioUrl);
      const arrayBuffer = await response.arrayBuffer();
      currentBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      startCanvasLoop();
    }

    function playRandomTrack() {
        if (globalTracks.length > 0) {
            const randomTrack = globalTracks[Math.floor(Math.random() * globalTracks.length)];
            openClipEditor(randomTrack.previewUrl);
        }
    }

    function startCanvasLoop() {
        if (animationId) cancelAnimationFrame(animationId);
        const ctx = previewCanvas.getContext('2d');
        const w = 720, h = 1280; 
        previewCanvas.width = w; previewCanvas.height = h;
        tempCanvas.width = w; tempCanvas.height = h;

        const render = (timestamp) => {
            ctx.save();
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            let cssFilter = 'none';

            if (activeFilter === 'noir') cssFilter = 'grayscale(100%) contrast(1.5)';
            else if (activeFilter === 'sepia') cssFilter = 'sepia(100%) contrast(1.1)';
            else if (activeFilter === 'thermal') cssFilter = 'invert(1) hue-rotate(180deg) saturate(3) contrast(1.5)';
            else if (activeFilter === 'cartoon') cssFilter = 'contrast(1.8) saturate(2.5)';
            else if (activeFilter === 'sketch') cssFilter = 'grayscale(1) brightness(1.5)';
            
            ctx.filter = cssFilter;

            if (webcamStream && videoElement.readyState >= 2) {
                const vW = videoElement.videoWidth, vH = videoElement.videoHeight;
                const videoAspect = vW / vH, canvasAspect = w / h;
                let dW, dH;
                if (videoAspect > canvasAspect) { dH = h; dW = h * videoAspect; } else { dW = w; dH = w / videoAspect; }
                const oX = (w - dW) / 2, oY = (h - dH) / 2;

                tCtx.save();
                tCtx.clearRect(0, 0, w, h);
                if (isMirrored) { 
                    tCtx.translate(w, 0); tCtx.scale(-1, 1); 
                    tCtx.drawImage(videoElement, (w - (oX + dW)), oY, dW, dH);
                } else {
                    tCtx.drawImage(videoElement, oX, oY, dW, dH);
                }
                tCtx.restore();

                if (activeFilter === 'scanner') {
                    if (!scannerStartTime && isRecording) scannerStartTime = timestamp;
                    let currentY = 0;
                    if (scannerStartTime) {
                        currentY = ((timestamp - scannerStartTime) / SCAN_DURATION) * h;
                        if (currentY > h) currentY = h;
                    }
                    if (scannerStartTime && currentY < h) {
                        const stepHeight = Math.max(1, currentY - lastScannerY + 2);
                        scannerCtx.drawImage(tempCanvas, 0, lastScannerY, w, stepHeight, 0, lastScannerY, w, stepHeight);
                    }
                    ctx.drawImage(scannerCanvas, 0, 0); 
                    if (currentY < h) {
                        ctx.drawImage(tempCanvas, 0, currentY, w, h - currentY, 0, currentY, w, h - currentY);
                        ctx.save();
                        ctx.fillStyle = "#1db954";
                        ctx.shadowBlur = 20; ctx.shadowColor = "#1db954";
                        ctx.fillRect(0, currentY, w, 3);
                        ctx.restore();
                    }
                    lastScannerY = currentY;
                } else if (activeFilter === 'neon') {
                    ctx.filter = 'none';
                    const hue = (timestamp / 15) % 360;
                    ctx.drawImage(tempCanvas, 0, 0);
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    ctx.filter = `hue-rotate(${hue}deg) saturate(10) brightness(2) contrast(1.5) blur(1px)`;
                    ctx.globalAlpha = 0.8;
                    ctx.drawImage(tempCanvas, 3, 3);
                    ctx.globalCompositeOperation = 'difference';
                    ctx.drawImage(tempCanvas, 0, 0);
                    ctx.restore();
                } else if (activeFilter === 'edges') {
                    ctx.filter = 'none';
                    ctx.save();
                    ctx.drawImage(tempCanvas, 0, 0);
                    ctx.globalCompositeOperation = 'difference';
                    ctx.filter = 'grayscale(1) contrast(10) invert(1)';
                    ctx.drawImage(tempCanvas, 2, 2);
                    ctx.restore();
                    ctx.save();
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.fillStyle = 'black';
                    ctx.globalAlpha = 0.1;
                    ctx.fillRect(0,0,w,h);
                    ctx.restore();
                } else if (activeFilter === 'sketch') {
                     ctx.filter = 'none';
                     ctx.fillStyle = 'white';
                     ctx.fillRect(0,0,w,h);
                     ctx.save();
                     ctx.globalCompositeOperation = 'difference';
                     ctx.filter = 'grayscale(1) contrast(5) invert(1)';
                     ctx.drawImage(tempCanvas, 0, 0);
                     ctx.drawImage(tempCanvas, 2, 2);
                     ctx.restore();
                } else if (activeFilter === 'cartoon') {
                    ctx.filter = 'none';
                    ctx.drawImage(tempCanvas, 0, 0);
                    const imgData = ctx.getImageData(0, 0, w, h);
                    const data = imgData.data;
                    const levels = 6;
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.round(data[i] / 255 * levels) / levels * 255;
                        data[i+1] = Math.round(data[i+1] / 255 * levels) / levels * 255;
                        data[i+2] = Math.round(data[i+2] / 255 * levels) / levels * 255;
                    }
                    ctx.putImageData(imgData, 0, 0);
                    ctx.save();
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.globalAlpha = 0.5;
                    ctx.filter = 'grayscale(1) contrast(10) invert(1)';
                    ctx.drawImage(tempCanvas, 1, 1);
                    ctx.restore();
                } else {
                    ctx.drawImage(tempCanvas, 0, 0);
                }
            }
            ctx.restore();

            // Overlay Marca de Agua
            ctx.save();
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = "white";
            ctx.font = "bold 24px Inter, sans-serif";
            ctx.textAlign = "right";
            ctx.fillText("Clippy Music Studio", w - 40, h - 40);
            ctx.restore();

            if (countdownValue > 0) {
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = "white"; ctx.font = "bold 300px sans-serif";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(countdownValue, w/2, h/2);
            }

            if (isRecording) {
                ctx.save();
                ctx.fillStyle = "#ff0000";
                ctx.globalAlpha = Math.sin(timestamp / 200) * 0.3 + 0.7;
                ctx.beginPath(); ctx.arc(50, 50, 15, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
            animationId = requestAnimationFrame(render);
        };
        animationId = requestAnimationFrame(render);
    }

    document.getElementById('exportBtn').onclick = () => {
      if (!currentBuffer || isRecording) return;
      stopPreview();
      initFilters(); 
      if(activeFilter === 'scanner') resetScanner();

      countdownValue = 3;
      const countInt = setInterval(() => {
          countdownValue--;
          if (countdownValue <= 0) { clearInterval(countInt); startRecording(); }
      }, 1000);
    };

    function startRecording() {
      const dur = currentBuffer.duration;
      const canvasStream = previewCanvas.captureStream(60);
      const dest = audioCtx.createMediaStreamDestination();
      const source = audioCtx.createBufferSource();
      source.buffer = currentBuffer;
      source.connect(dest);
      source.connect(audioCtx.destination);
      
      const combined = new MediaStream([...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
      const recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 12000000 });
      const chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        isRecording = false; progressBox.style.display = "none"; timerDisplay.style.display = "none";
        const blob = new Blob(chunks, { type: 'video/webm' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Clippy_Clip_${Date.now()}.webm`;
        a.click();
        document.getElementById('exportBtn').textContent = "🔴 GRABAR CLIP";
        document.getElementById('exportBtn').classList.remove('recording');
      };
      recorder.start();
      source.start(0);
      isRecording = true;
      document.getElementById('exportBtn').textContent = "GRABANDO...";
      document.getElementById('exportBtn').classList.add('recording');
      progressBox.style.display = "block"; timerDisplay.style.display = "block";
      const startT = Date.now();
      const up = setInterval(() => {
          const el = (Date.now() - startT) / 1000;
          progressBar.style.width = (el / dur) * 100 + "%";
          timeLeftSpan.textContent = Math.max(0, dur - el).toFixed(1) + "s";
          if (el >= dur) { clearInterval(up); recorder.stop(); source.stop(); }
      }, 30);
    }

    function closeModal() {
      modal.classList.remove('show'); stopPreview();
      if (webcamStream) webcamStream.getTracks().forEach(t => t.stop());
      if (animationId) cancelAnimationFrame(animationId);
    }

    function handleOutsideClick(e) { if (e.target === modal) closeModal(); }

    async function fetchTopSpain() {
      resultsGrid.innerHTML = '<div class="loader" style="margin: 40px auto; grid-column: 1/-1;"></div>';
      try {
        const r = await fetch(`https://itunes.apple.com/search?country=ES&entity=song&term=hits&limit=24`);
        const data = await r.json();
        globalTracks = data.results;
        renderResults(globalTracks);
      } catch(e) { resultsGrid.innerHTML = "Error de conexión."; }
    }

    function renderResults(tracks) {
      resultsGrid.innerHTML = '';
      tracks.forEach(t => {
        const card = document.createElement('div');
        card.className = 'track';
        const img = t.artworkUrl100.replace('100x100', '600x600');
        card.innerHTML = `
          <img src="${img}" alt="Portada de ${t.trackName}">
          <h3>${t.trackName}</h3>
          <p>${t.artistName}</p>
          <button class="btn-full" onclick="openClipEditor('${t.previewUrl}')">GRABAR</button>
        `;
        resultsGrid.appendChild(card);
      });
    }

    document.getElementById('searchForm').onsubmit = (e) => {
      e.preventDefault();
      fetchTracks(document.getElementById('query').value);
    };

    async function fetchTracks(q) {
      resultsGrid.innerHTML = '<div class="loader" style="margin: 40px auto; grid-column: 1/-1;"></div>';
      const r = await fetch(`https://itunes.apple.com/search?country=ES&entity=song&term=${q}&limit=24`);
      const d = await r.json();
      globalTracks = d.results;
      renderResults(globalTracks);
    }

    window.onload = fetchTopSpain;
  </script>
</body>
</html>
