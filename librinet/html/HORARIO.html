<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Completo - IES Valle de Leiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-column { min-width: 150px; }
        .current-day { background-color: #f0f9ff; border: 2px solid #3b82f6 !important; }
        .cell-green { background-color: #d1fae5 !important; color: #065f46; }
        .cell-red { background-color: #fee2e2 !important; color: #991b1b; }
        .hour-row:hover { background-color: #f9fafb; }
        .cell-interactive { cursor: pointer; user-select: none; transition: all 0.2s; border: 1px solid #e5e7eb; }
        .cell-interactive:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-6">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Mi Horario Personalizado</h1>
            <p class="text-gray-600 mt-2">1º Bachillerato - <span class="font-bold text-blue-600">Atención Educativa</span></p>
            
            <div class="mt-4 flex flex-wrap justify-center gap-4 text-xs font-semibold">
                <span class="flex items-center bg-white px-3 py-1 rounded-full shadow-sm border"><span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span> Clic Izq: Hecho (Verde)</span>
                <span class="flex items-center bg-white px-3 py-1 rounded-full shadow-sm border"><span class="w-3 h-3 bg-red-400 rounded-full mr-2"></span> Clic Der: No hecho (Rojo)</span>
                <span class="flex items-center bg-blue-100 text-blue-700 px-3 py-1 rounded-full border border-blue-200">Hoy resaltado</span>
            </div>
        </header>

        <div class="overflow-x-auto bg-white rounded-2xl shadow-2xl border border-gray-200">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="p-4 border-r border-slate-700 text-left w-24">Hora</th>
                        <th id="day-1" class="p-4 border-r border-slate-700 day-column text-center">Lunes</th>
                        <th id="day-2" class="p-4 border-r border-slate-700 day-column text-center">Martes</th>
                        <th id="day-3" class="p-4 border-r border-slate-700 day-column text-center">Miércoles</th>
                        <th id="day-4" class="p-4 border-r border-slate-700 day-column text-center">Jueves</th>
                        <th id="day-5" class="p-4 day-column text-center">Viernes</th>
                    </tr>
                </thead>
                <tbody id="timetable-body">
                    <!-- Filas generadas dinámicamente -->
                </tbody>
            </table>
        </div>
        
        <div class="mt-6 flex flex-col items-center gap-2">
            <button onclick="clearAll()" class="text-xs bg-gray-200 hover:bg-red-100 hover:text-red-600 text-gray-500 py-1 px-4 rounded-full transition-colors">
                Limpiar todos los colores (Reset)
            </button>
            <p class="text-xs text-gray-400">Los cambios se guardan automáticamente en tu dispositivo.</p>
        </div>
    </div>

    <script>
        const hours = [
            "08:30 - 09:25", "09:25 - 10:20", "10:20 - 11:15", 
            "11:45 - 12:40", "12:40 - 13:35", "13:35 - 14:30", "14:40 - 15:35"
        ];

        /**
         * RESUMEN DE ASIGNATURAS POR DÍA (SEGÚN TUS INSTRUCCIONES):
         * LUNES: Mates, Anatomía, Tecnología, Lengua, Física y Química, Inglés, At. Educativa
         * MARTES: Fis-Qui, Filosofía, Lengua, Inglés, Mates, Tecnología, At. Educativa
         * MIÉRCOLES: Tecnología, Fis-Qui, Mates, GIG, Ed. Física, Lengua, At. Educativa
         * JUEVES: Filosofía, Tecnología, Física y Química, Anatomía, Lengua, Inglés
         * VIERNES: Lengua, Educación Física, Matemáticas, GIG, Inglés, Filosofía
         */
        const fullSchedule = {
            "08:30 - 09:25": ["Matemáticas", "Física y Química", "Tecnología", "Filosofía", "Lengua"],
            "09:25 - 10:20": ["Anatomía", "Filosofía", "Física y Química", "Tecnología", "Educación Física"],
            "10:20 - 11:15": ["Tecnología", "Lengua", "Matemáticas", "Física y Química", "Matemáticas"],
            "11:45 - 12:40": ["Lengua", "Inglés", "GIG", "Anatomía", "GIG"],
            "12:40 - 13:35": ["Física y Química", "Matemáticas", "Educación Física", "Lengua", "Inglés"],
            "13:35 - 14:30": ["Inglés", "Tecnología", "Lengua", "Inglés", "Filosofía"],
            "14:40 - 15:35": ["Atención Educativa", "Atención Educativa", "Atención Educativa", "---", "---"]
        };

        const storageKey = 'mi_horario_v7_final_viernes';
        let savedColors = JSON.parse(localStorage.getItem(storageKey)) || {};

        function renderTable() {
            const body = document.getElementById('timetable-body');
            body.innerHTML = '';
            const today = new Date().getDay(); // 1=Lunes, 5=Viernes

            // Resaltar cabecera de hoy
            if (today >= 1 && today <= 5) {
                const header = document.getElementById(`day-${today}`);
                if (header) header.classList.add('current-day');
            }

            hours.forEach((time) => {
                const row = document.createElement('tr');
                row.className = 'hour-row';
                
                let html = `<td class="p-3 border-r bg-gray-50 font-bold text-gray-500 text-[10px] text-center">${time}</td>`;
                
                for (let i = 0; i < 5; i++) {
                    const dayNum = i + 1;
                    const subject = fullSchedule[time][i] || "---";
                    const cellId = `cell-${time}-${dayNum}`.replace(/\s/g, '');
                    const statusClass = savedColors[cellId] || '';
                    const isToday = (dayNum === today) ? 'current-day' : '';

                    html += `
                        <td id="${cellId}" 
                            class="p-3 text-center text-xs font-medium cell-interactive ${statusClass} ${isToday}"
                            oncontextmenu="handleRightClick(event, '${cellId}')"
                            onclick="handleLeftClick('${cellId}')">
                            ${subject}
                        </td>`;
                }
                
                row.innerHTML = html;
                body.appendChild(row);
            });
        }

        function handleLeftClick(id) {
            const el = document.getElementById(id);
            if (!el) return;
            if (el.classList.contains('cell-green')) {
                el.classList.remove('cell-green');
                delete savedColors[id];
            } else {
                el.classList.remove('cell-red');
                el.classList.add('cell-green');
                savedColors[id] = 'cell-green';
            }
            save();
        }

        function handleRightClick(e, id) {
            e.preventDefault();
            const el = document.getElementById(id);
            if (!el) return false;
            if (el.classList.contains('cell-red')) {
                el.classList.remove('cell-red');
                delete savedColors[id];
            } else {
                el.classList.remove('cell-green');
                el.classList.add('cell-red');
                savedColors[id] = 'cell-red';
            }
            save();
            return false;
        }

        function clearAll() {
            if(confirm("¿Seguro que quieres borrar todas las marcas de colores de la semana?")) {
                savedColors = {};
                save();
                renderTable();
            }
        }

        function save() {
            localStorage.setItem(storageKey, JSON.stringify(savedColors));
        }

        window.onload = renderTable;
    </script>
</body>
</html>
